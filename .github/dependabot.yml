version: 2
updates:
  # Application dependencies (npm)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      # Batch low-risk dev/test tooling to keep PR noise down.
      dev-tooling:
        patterns:
          - "@vitest/*"
          - "vitest"
          - "@testing-library/*"
          - "@playwright/*"
          - "@axe-core/*"
          - "@lhci/*"
          - "eslint*"
          - "typescript-eslint"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-router-dom"
    labels:
      - dependencies

  # GitHub Actions used by the CI workflow
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions
